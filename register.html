<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Medcare</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #f0f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: #fff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 25px;
      color: #20b486;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      transition: 0.3s;
    }

    .login-container input:focus {
      border-color: #20b486;
      outline: none;
    }

    .login-container button {
      background-color: #20b486;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 18px;
      transition: 0.3s;
    }

    .login-container button:hover {
      background-color: #16916f;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-bottom: 10px;
      display: none;
    }

    .ok {
      color: #16916f;
      font-size: 14px;
      margin-bottom: 10px;
      display: none;
    }

    .login-container p {
      margin-top: 15px;
      font-size: 14px;
    }

    .login-container a {
      color: #20b486;
      text-decoration: none;
      font-weight: 500;
    }

    .login-container a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Register</h2>
    <form id="registerForm">
      <div class="error" id="errorMsg">⚠️ Registration failed.</div>
      <div class="ok" id="okMsg">✅ Account created. You can login now.</div>
      <input type="text" id="name" placeholder="Your name" required />
      <input type="email" id="email" placeholder="Enter your email" required />
      <input type="password" id="password" placeholder="Create password (min 6)" required />
      <button type="submit">Create account</button>
    </form>
    <p>Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script>
    async function fetchJson(url, opts) {
      const res = await fetch(url, Object.assign({ headers: { "Content-Type": "application/json" } }, opts));
      const json = await res.json().catch(() => null);
      if (!res.ok || !json || !json.ok) {
        const msg = (json && json.error) ? json.error : ("Request failed (" + res.status + ")");
        throw new Error(msg);
      }
      return json.data;
    }

    document.getElementById("registerForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const errorMsg = document.getElementById("errorMsg");
      const okMsg = document.getElementById("okMsg");
      errorMsg.style.display = "none";
      okMsg.style.display = "none";

      try {
        await fetchJson("/api/auth/register", {
          method: "POST",
          body: JSON.stringify({
            name: document.getElementById("name").value.trim(),
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value
          })
        });
        okMsg.style.display = "block";
        this.reset();
      } catch (err) {
        errorMsg.textContent = "⚠️ " + (err && err.message ? err.message : "Registration failed");
        errorMsg.style.display = "block";
      }
    });
  </script>
</body>
</html>
