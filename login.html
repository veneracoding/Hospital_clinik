<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirish | Medcare</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: var(--surface);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 25px;
      color: #20b486;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      transition: 0.3s;
      background: var(--surface);
      color: var(--text);
    }

    .login-container input:focus {
      border-color: #20b486;
      outline: none;
    }

    .login-container button {
      background-color: #20b486;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      font-size: 18px;
      transition: 0.3s;
    }

    .login-container button:hover {
      background-color: #16916f;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-bottom: 10px;
      display: none;
    }

    .login-container p {
      margin-top: 15px;
      font-size: 14px;
    }

    .login-container a {
      color: #20b486;
      text-decoration: none;
      font-weight: 500;
    }

    .login-container a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div style="position:fixed;top:18px;right:18px;z-index:1001;">
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Qorong‘i mavzu">
      <span class="theme-toggle__thumb"><i class="fa-regular fa-sun"></i></span>
    </button>
  </div>
  <div class="login-container">
    <h2>Kirish</h2>
    <p id="loginHint" style="display:none;color:#20b486;margin-bottom:15px;">Davom etish uchun admin akkaunt bilan kiring.</p>
    <form id="loginForm">
      <div class="error" id="errorMsg">⚠️ Email yoki parol noto‘g‘ri.</div>
      <input type="email" id="email" placeholder="Emailingizni kiriting" required />
      <input type="password" id="password" placeholder="Parolni kiriting" required />
      <button type="submit">Kirish</button>
    </form>
    <p>Akkauntingiz yo‘qmi? <a href="register.html">Ro‘yxatdan o‘tish</a></p>
  </div>

  <script>
    async function fetchJson(url, opts) {
      const res = await fetch(url, Object.assign({ cache: "no-store", credentials: "include", headers: { "Content-Type": "application/json" } }, opts));
      const json = await res.json().catch(() => null);
      if (!res.ok || !json || !json.ok) {
        const msg = (json && json.error) ? json.error : ("So‘rov bajarilmadi (" + res.status + ")");
        throw new Error(msg);
      }
      return json.data;
    }

    function getParam(name) {
      const u = new URL(window.location.href);
      return u.searchParams.get(name);
    }

    if (getParam("admin") === "1") {
      document.getElementById("loginHint").style.display = "block";
    }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");

      errorMsg.style.display = "none";

      if (!email || !password) {
        alert("Iltimos, barcha maydonlarni to‘ldiring.");
        return;
      }

      if (!/^[^ ]+@[^ ]+\.[a-z]{2,}$/i.test(email)) {
        errorMsg.textContent = "⚠️ To‘g‘ri email manzilini kiriting.";
        errorMsg.style.display = "block";
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent = "⚠️ Parol kamida 6 ta belgidan iborat bo‘lishi kerak.";
        errorMsg.style.display = "block";
        return;
      }

      try {
        const loginData = await fetchJson("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({ email: email.toLowerCase(), password })
        });
        const next = getParam("next");
        if (next) {
          window.location.href = next;
          return;
        }
        if (loginData && loginData.user && loginData.user.role === "admin") {
          window.location.href = "admin.html";
          return;
        }
        window.location.href = "appointments.html";
      } catch (err) {
        errorMsg.textContent = "⚠️ " + (err && err.message ? err.message : "Email yoki parol noto‘g‘ri.");
        errorMsg.style.display = "block";
      }
    });
  </script>
</body>
</html>
