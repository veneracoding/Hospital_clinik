<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor | Medcare</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background:#f9f9f9; }
    .wrap { max-width: 1000px; margin: 100px auto 50px; padding: 0 20px; }
    .card {
      background:#fff;
      border-radius: 18px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      padding: 22px;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .top { display:flex; gap: 18px; align-items:center; flex-wrap: wrap; }
    .photo {
      width: 140px; height: 140px; border-radius: 16px; object-fit: cover;
      border: 3px solid rgba(22,160,133,.25);
      background:#f7fffd;
    }
    .name { font-size: 2.8rem; color: var(--black); margin: 0; }
    .spec { margin-top: 6px; font-size: 1.6rem; color: var(--light-color); }
    .bio { margin-top: 18px; font-size: 1.6rem; color: var(--light-color); line-height: 1.7; }
    .chips { margin-top: 14px; display:flex; gap: 10px; flex-wrap: wrap; }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(22,160,133,.18);
      background:#f7fffd;
      font-size: 1.4rem;
      color: var(--black);
    }
    .actions { margin-top: 18px; display:flex; gap: 12px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo"><i class="fa-solid fa-heart-pulse"></i> medcare.</a>
    <nav class="navbar">
      <a href="index.html#home">home</a>
      <a href="index.html#doctors">doctors</a>
      <a href="index.html#book">book</a>
      <a href="appointments.html">my appointments</a>
      <a href="docs.html#doctors">documentation</a>
    </nav>
    <div id="menu-btn" class="fas fa-bars"></div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="top">
        <img id="photo" class="photo" alt="Doctor photo" />
        <div>
          <h1 id="name" class="name">Doctor</h1>
          <div id="spec" class="spec"></div>
        </div>
      </div>

      <div class="chips">
        <div class="chip"><i class="fa-regular fa-clock"></i> Mon–Fri, 09:00–17:00</div>
        <div class="chip"><i class="fa-solid fa-location-dot"></i> Medcare clinic</div>
        <div class="chip"><i class="fa-solid fa-star"></i> Experienced specialist</div>
      </div>

      <p class="bio" id="bio">
        Biography will appear here. You can replace this text with real doctor information (education, experience, awards, languages).
      </p>

      <div class="actions">
        <a class="btn" href="index.html#book">book now <span class="fas fa-chevron-right"></span></a>
        <a class="btn" href="index.html#doctors">back <span class="fas fa-chevron-right"></span></a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    async function fetchJson(url, opts) {
      const res = await fetch(url, opts);
      const json = await res.json().catch(() => null);
      if (!res.ok || !json || !json.ok) {
        const msg = (json && json.error) ? json.error : ("Request failed (" + res.status + ")");
        throw new Error(msg);
      }
      return json.data;
    }

    function getParam(name) {
      const u = new URL(window.location.href);
      return u.searchParams.get(name);
    }

    (async () => {
      const id = getParam("id");
      const doctors = await fetchJson("/api/doctors");
      const d = doctors.find(x => x.id === id) || doctors[0];

      document.title = (d ? d.name : "Doctor") + " | Medcare";
      document.getElementById("name").textContent = d ? d.name : "Doctor";
      document.getElementById("spec").textContent = d ? d.specialty : "";
      const photo = document.getElementById("photo");
      if (d && d.photo) photo.src = d.photo;

      if (d && typeof d.bio === "string" && d.bio.trim()) {
        document.getElementById("bio").textContent = d.bio.trim();
      }
    })().catch(() => {
      // Keep page usable even if API is unavailable
    });
  </script>
</body>
</html>
