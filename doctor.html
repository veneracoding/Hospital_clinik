<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shifokor | Medcare</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: var(--bg); }
    .wrap { max-width: 1000px; margin: 100px auto 50px; padding: 0 20px; }
    .card {
      background: var(--surface);
      border-radius: 18px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      padding: 22px;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .top { display:flex; gap: 18px; align-items:center; flex-wrap: wrap; }
    .photo {
      width: 140px; height: 140px; border-radius: 16px; object-fit: cover;
      border: 3px solid rgba(22,160,133,.25);
      background:#f7fffd;
    }
    .name { font-size: 2.8rem; color: var(--black); margin: 0; }
    .spec { margin-top: 6px; font-size: 1.6rem; color: var(--light-color); }
    .bio { margin-top: 18px; font-size: 1.6rem; color: var(--light-color); line-height: 1.7; }
    .chips { margin-top: 14px; display:flex; gap: 10px; flex-wrap: wrap; }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(22,160,133,.18);
      background:#f7fffd;
      font-size: 1.4rem;
      color: var(--black);
    }
    .actions { margin-top: 18px; display:flex; gap: 12px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <header class="header">
    <a href="index.html" class="logo"><i class="fa-solid fa-heart-pulse"></i> medcare.</a>
    <nav class="navbar">
      <a href="index.html#home">bosh sahifa</a>
      <a href="index.html#doctors">shifokorlar</a>
      <a href="index.html#book">yozilish</a>
      <a href="appointments.html">yozuvlarim</a>
      <a href="docs.html#doctors">hujjatlar</a>
    </nav>
    <div style="display:flex;align-items:center;gap:1rem;">
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Qorong‘i mavzu">
        <span class="theme-toggle__thumb"><i class="fa-regular fa-sun"></i></span>
      </button>
      <div id="menu-btn" class="fas fa-bars"></div>
    </div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="top">
        <img id="photo" class="photo" alt="Shifokor fotosi" />
        <div>
          <h1 id="name" class="name">Shifokor</h1>
          <div id="spec" class="spec"></div>
        </div>
      </div>

      <div class="chips">
        <div class="chip" id="workTimeChip"><i class="fa-regular fa-clock"></i> Du–Ju, 09:00–17:00</div>
        <div class="chip"><i class="fa-solid fa-location-dot"></i> Medcare klinikasi</div>
        <div class="chip"><i class="fa-solid fa-star"></i> Tajribali mutaxassis</div>
      </div>

      <p class="bio" id="bio">
        Bu yerda shifokor biografiyasi ko‘rinadi. Ushbu matnni haqiqiy ma’lumotlar (ta’lim, tajriba, yutuqlar, tillar) bilan almashtiring.
      </p>

      <div id="details" style="display:grid;gap:12px;margin-top:14px;"></div>

      <div class="actions">
        <a class="btn" id="bookLink" href="index.html#book">qabulga yozilish <span class="fas fa-chevron-right"></span></a>
        <a class="btn" href="index.html#doctors">orqaga <span class="fas fa-chevron-right"></span></a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    async function fetchJson(url, opts) {
      const res = await fetch(url, opts);
      const json = await res.json().catch(() => null);
      if (!res.ok || !json || !json.ok) {
        const msg = (json && json.error) ? json.error : ("So‘rov bajarilmadi (" + res.status + ")");
        throw new Error(msg);
      }
      return json.data;
    }

    function getParam(name) {
      const u = new URL(window.location.href);
      return u.searchParams.get(name);
    }

    (async () => {
      const id = getParam("id");
      const doctors = await fetchJson("/api/doctors");
      const d = doctors.find(x => x.id === id) || doctors[0];

      document.title = (d ? d.name : "Shifokor") + " | Medcare";
      document.getElementById("name").textContent = d ? d.name : "Shifokor";
      document.getElementById("spec").textContent = d ? d.specialty : "";
      const photo = document.getElementById("photo");
      if (d && d.photo) photo.src = d.photo;

      if (d && typeof d.bio === "string" && d.bio.trim()) {
        document.getElementById("bio").textContent = d.bio.trim();
      }

      if (d && (d.workStart || d.workEnd)) {
        const ws = d.workStart || "09:00";
        const we = d.workEnd || "17:00";
        const chip = document.getElementById("workTimeChip");
        if (chip) chip.innerHTML = '<i class="fa-regular fa-clock"></i> Du–Ju, ' + ws + "–" + we;
      }

      const bookLink = document.getElementById("bookLink");
      if (bookLink && d && d.id) {
        bookLink.href = "index.html?doctorId=" + encodeURIComponent(d.id) + "#book";
      }

      const details = document.getElementById("details");
      const blocks = [];
      const addBlock = (title, icon, text) => {
        const t = (text || "").trim();
        if (!t) return;
        const items = t.split("\n").map(x => x.trim()).filter(Boolean);
        const li = items.map(x => `<div style="display:flex;gap:10px;align-items:flex-start;"><i class="fa-solid fa-check" style="color:var(--green);margin-top:3px;"></i><div style="font-size:1.55rem;color:var(--text);line-height:1.5;">${x}</div></div>`).join("");
        blocks.push(`
          <div style="background:var(--surface);border:1px solid var(--outline);border-radius:16px;padding:16px;box-shadow:var(--shadow);">
            <div style="display:flex;gap:10px;align-items:center;font-size:1.8rem;font-weight:800;color:var(--text);">
              <i class="fa-solid ${icon}" style="color:var(--green);"></i> ${title}
            </div>
            <div style="margin-top:10px;display:grid;gap:8px;">${li}</div>
          </div>
        `);
      };

      addBlock("Ta’lim", "fa-graduation-cap", d.education);
      addBlock("Tajriba", "fa-briefcase", d.experience);
      addBlock("Yutuqlar", "fa-award", d.achievements);
      addBlock("Tillar", "fa-language", d.languages);

      if (details) {
        details.innerHTML = blocks.join("");
        if (!blocks.length) details.style.display = "none";
      }
    })().catch(() => {
      // Keep page usable even if API is unavailable
    });
  </script>
</body>
</html>
